  - DOMAIN-SUFFIX,local,直连模式
  - IP-CIDR,127.0.0.0/8,直连模式,no-resolve
  - IP-CIDR,10.0.0.0/8,直连模式,no-resolve
  - IP-CIDR,172.16.0.0/12,直连模式,no-resolve
  - IP-CIDR,192.168.0.0/16,直连模式,no-resolve
  - IP-CIDR,100.64.0.0/10,直连模式,no-resolve
  - IP-CIDR,224.0.0.0/4,直连模式,no-resolve

  - DST-PORT,443,策略模式
  - RULE-SET,LAN,直连模式
  - RULE-SET,苹果服务,苹果服务
  - RULE-SET,谷歌服务,谷歌服务
  - RULE-SET,微软服务,微软服务
  - RULE-SET,推特服务,推特服务
  - RULE-SET,飞机服务,飞机服务
  - RULE-SET,智能服务,智能服务
