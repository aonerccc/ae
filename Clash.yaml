mixed-port: 7890
allow-lan: false
bind-address: "*"
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true

external-controller: 127.0.0.1:9090
secret: ""

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - Mijia Cloud
    - dlg.io.mi.com
    - "*.apple.com"

tun:
  enable: false
  stack: mixed
  dns-hijack:
    - any:53
  auto-route: true
  auto-detect-interface: true
  strict-route: false

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - localhost.ptlogin2.qq.com
    - "*.cmpassport.com"
    - "*.jegotrip.com.cn"
    - "*.icitymobile.mobi"
    - id6.me
    - "*.pingan.com.cn"
    - "*.cmbchina.com"
    - "*.apple.com"
    - "*.icloud.com"
    - "*.mzstatic.com"
    - "*.music.163.com"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - time.*.com
    - ntp.*.com
    - "*.pool.ntp.org"

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114

  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query

  nameserver-policy:
    "*.tencent.com": 119.29.29.29
    "*.weixin.com": 119.29.29.29
    "*.qq.com": 119.29.29.29
    "geosite:cn":
      - 223.5.5.5
      - 119.29.29.29

proxy-providers:
  机场订阅:
    type: http
    url: "你的订阅链接"
    interval: 86400
    path: ./providers/proxy/机场订阅.yaml
    health-check:
      enable: true
      interval: 300
      url: http://www.gstatic.com/generate_204

proxy-groups:
  - name: 策略模式
    type: select
    proxies:
      - 优选
      - 香港
      - 狮城
      - 日本
      - 美国
      - 台湾
      - 韩国
      - DIRECT

  - name: 苹果服务
    type: select
    proxies:
      - DIRECT
      - 策略模式
      - 香港
      - 狮城
      - 日本
      - 美国
      - 台湾
      - 韩国

  - name: 谷歌服务
    type: select
    proxies:
      - 策略模式
      - 香港
      - 狮城
      - 日本
      - 美国
      - 台湾
      - 韩国

  - name: 微软服务
    type: select
    proxies:
      - 策略模式
      - DIRECT
      - 香港
      - 狮城
      - 日本
      - 美国
      - 台湾
      - 韩国

  - name: 推特服务
    type: select
    proxies:
      - 策略模式
      - 香港
      - 日本
      - 美国
      - 台湾
      - 韩国

  - name: 飞机服务
    type: select
    proxies:
      - 策略模式
      - 香港
      - 狮城
      - 日本
      - 美国
      - 台湾
      - 韩国

  - name: 智能服务
    type: select
    proxies:
      - 策略模式
      - 美国
      - 日本
      - 香港
      - 台湾
      - 狮城
      - 韩国

  - name: 抖音服务
    type: select
    proxies:
      - 策略模式
      - 香港
      - 台湾
      - 日本
      - 美国
      - 狮城
      - 韩国

  - name: Spotify
    type: select
    proxies:
      - 策略模式
      - 香港
      - 台湾
      - 日本
      - 美国
      - 狮城
      - 韩国

  - name: Ins Ins
    type: select
    proxies:
      - 策略模式
      - 香港
      - 日本
      - 美国
      - 台湾
      - 狮城
      - 韩国

  - name: 直连模式
    type: select
    proxies:
      - DIRECT

  - name: 禁止模式
    type: select
    proxies:
      - REJECT

  - name: 优选
    type: url-test
    use:
      - 机场订阅
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 香港
    type: url-test
    use:
      - 机场订阅
    filter: "(?i)香港|港|HK|Hong"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 狮城
    type: url-test
    use:
      - 机场订阅
    filter: "(?i)新加坡|狮|SG|Singapore"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 日本
    type: url-test
    use:
      - 机场订阅
    filter: "(?i)日本|日|JP|Japan"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 美国
    type: url-test
    use:
      - 机场订阅
    filter: "(?i)美国|美|US|States|America|United States"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 台湾
    type: url-test
    use:
      - 机场订阅
    filter: "(?i)台湾|台|TW|Taiwan|Taipei"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 韩国
    type: url-test
    use:
      - 机场订阅
    filter: "(?i)韩国|韩|KR|Korea"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

